<body>

    <script>
        const originalFetch = window.fetch;

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    fetch(fileParts[index]).then((response) => {
                        if (!response.ok) throw new Error("Missing part: " + fileParts[index]);
                        return response.arrayBuffer();
                    }).then((data) => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push("https://cdn.jsdelivr.net/gh/genizy/web-port@main/buckshot-roulette/" + file + ".part" + i);
            }
            return parts;
        }

        Promise.all([
            mergeFiles(getParts("buckshot-roulette.pck", 1, 10)),
            mergeFiles(getParts("buckshot-roulette.wasm", 1, 3))
        ]).then(([pckUrl, wasmUrl]) => {
            window.fetch = async function (url, ...args) {
                if (url.endsWith("buckshot-roulette.pck")) {
                    return originalFetch(pckUrl, ...args);
                } else if (url.endsWith("buckshot-roulette.wasm")) {
                    return originalFetch(wasmUrl, ...args);
                } else {
                    return originalFetch(url, ...args);
                }
            };

            const GODOT_CONFIG = {
                "args": [],
                "canvasResizePolicy": 2,
                "ensureCrossOriginIsolationHeaders": false,
                "executable": "buckshot-roulette",
                "experimentalVK": false,
                "fileSizes": {
                    "buckshot-roulette.pck": 344705792,
                    "buckshot-roulette.wasm": 43444261
                },
                "focusCanvas": false,
                "gdextensionLibs": []
            };

            const GODOT_THREADS_ENABLED = false;
            const engine = new Engine(GODOT_CONFIG);

            function run() {
                const loadingText = document.getElementById('loading-text');
                const statusOverlay = document.getElementById('status');
                const statusProgress = document.getElementById('status-progress');
                const statusProgressInner = document.getElementById('status-progress-inner');
                const statusNotice = document.getElementById('status-notice');

                let initializing = true;
                let statusMode = '';

                function setStatusMode(mode) {
                    if (statusMode === mode || !initializing) {
                        return;
                    }
                    if (mode === 'hidden') {
                        statusOverlay.classList.remove('show');
                        initializing = false;
                        return;
                    }
                    statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
                    statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
                    statusMode = mode;
                }

                function setStatusNotice(text) {
                    while (statusNotice.lastChild) {
                        statusNotice.removeChild(statusNotice.lastChild);
                    }
                    const lines = text.split('\n');
                    lines.forEach((line) => {
                        statusNotice.appendChild(document.createTextNode(line));
                        statusNotice.appendChild(document.createElement('br'));
                    });
                }

                function displayFailureNotice(err) {
                    console.error(err);
                    if (err instanceof Error) {
                        setStatusNotice(err.message);
                    } else if (typeof err === 'string') {
                        setStatusNotice(err);
                    } else {
                        setStatusNotice('An unknown error occurred.');
                    }
                    setStatusMode('notice');
                    initializing = false;
                }

                const missing = Engine.getMissingFeatures({
                    threads: GODOT_THREADS_ENABLED,
                });

                if (missing.length !== 0) {
                    const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
                    displayFailureNotice(missingMsg + missing.join('\n'));
                } else {
                    setStatusMode('progress');
                    engine.startGame({
                        'onProgress': function (current, total) {
                            if (current > 0 && total > 0) {
                                statusProgressInner.style.width = (current / total) * 100 + '%';
                                loadingText.textContent = 'Loading... ' + Math.round((current / total) * 100) + '%';
                            }
                        },
                    }).then(() => {
                        setStatusMode('hidden');
                    }, displayFailureNotice);
                }
            }

            window.godotRunStart = run;
            run();
        }).catch((err) => {
            console.error('Failed to merge game files:', err);
            document.getElementById('status-notice').textContent = 'Error loading game files. Please refresh the page.';
            document.getElementById('status-notice').style.display = 'block';
        });
    </script>
